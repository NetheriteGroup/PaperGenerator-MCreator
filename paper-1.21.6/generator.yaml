name: Minecraft Paper for @minecraft-@buildfileversion
status: stable
buildfileversion: 60
subversion: 1

import:
  - datapack-1.21.6:
    exclude:
      - features
      - jsontriggers

gradle:
  export_file: "build/libs/plugin.jar"
  run_server: runPaperServer
  sync_task: buildPaper

source_root: "@WORKSPACEROOT/src/main/java"
res_root: "@WORKSPACEROOT/src/main/resources"

import_formatter:
  duplicates_whitelist:
    - java.util
    - net.minecraft
    - org.bukkit
    - org.spigotmc
    - io.papermc
    - net.kyori

base_templates:
- template: modbase/mod.java.ftl
  name: "@SRCROOT/@BASEPACKAGEPATH/@JavaModName.java"
  canLock: true
- template: modbase/bootstrap.java.ftl
  name: "@SRCROOT/@BASEPACKAGEPATH/@JavaModNameBootstrap.java"
  canLock: true
- template: modbase/paper-plugin.yml.ftl
  writer: file
  name: "@RESROOT/paper-plugin.yml"
  canLock: true
- template: modbase/settings.gradle.ftl
  writer: file
  name: "@WORKSPACEROOT/settings.gradle"